version: "3.9"

services:
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

  backend:
    image: python:3.11
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && python app.py"
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
